<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Monitoring App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: white;
      padding: 50px 60px;
      border-radius: 15px;
      box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
      text-align: center;
      width: 420px;
      animation: fadeIn 1s ease-in-out;
    }
    .logo {
      font-size: 60px;
      color: #ff416c;
      margin-bottom: 15px;
      animation: pulse 1.5s infinite;
    }
    h1 {
      margin-bottom: 15px;
      color: #333;
    }
    p {
      margin-bottom: 25px;
      color: #666;
    }
    .btn {
      display: inline-block;
      margin: 15px;
      padding: 15px 35px;
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      transition: all 0.3s ease;
      color: white;
    }
    .btn-doctor {
      background: linear-gradient(to right, #ff4b2b, #ff416c);
    }
    .btn-patient {
      background: linear-gradient(to right, #56ab2f, #a8e063);
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><i class="fas fa-heartbeat"></i></div>
    <h1>Welcome to Health Monitoring App</h1>
    <p>Please select your role:</p>
    <a href="/doctor" class="btn btn-doctor">Doctor</a>
    <a href="/patient" class="btn btn-patient">Patient</a>
  </div>
</body>
</html>
