<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Details</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 0;
    }
    .header {
      background: #007bff;
      color: white;
      text-align: center;
      padding: 20px 0;
      font-size: 1.5rem;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .container {
      max-width: 500px;
      margin: 30px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }
    form p {
      margin: 15px 0;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      background-color: #f9f9f9;
    }
    input[readonly] {
      background-color: #e9ecef;
      cursor: not-allowed;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #007bff;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #0056b3;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #007bff;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="header">Patient Dashboard</div>

  <div class="container">
    <h2>Enter Patient Details</h2>

    <form method="POST">
      <!-- Manual fields -->
      <p>
        Name:<br>
        <input type="text" name="name" required>
      </p>

      <p>
        Age:<br>
        <input type="number" name="age" required>
      </p>

      <!-- Auto-filled sensor fields -->
      <p>
        Temperature (°F):<br>
        <input type="number" step="0.1" name="temp" id="temp" readonly>
      </p>

      <p>
        Heart Rate (bpm):<br>
        <input type="number" name="heartrate" id="heartrate" readonly>
      </p>

      <p>
        ECG (mV):<br>
        <input type="number" step="0.01" name="ecg" id="ecg" readonly>
      </p>

      <p>
        <button type="submit">Submit</button>
      </p>
    </form>

    <a class="back-link" href="/">Back to Home</a>
  </div>

  <!-- 🔁 AUTO FETCH SENSOR DATA -->
  <script>
    function fetchSensorData() {
      fetch('/get_sensor_data')
        .then(response => response.json())
        .then(data => {
          if (data.temp !== undefined) {
            document.getElementById("temp").value = data.temp;
            document.getElementById("heartrate").value = data.heartrate;
            document.getElementById("ecg").value = data.ecg;
          }
        })
        .catch(err => console.error("Sensor fetch error:", err));
    }

    // Fetch every 2 seconds
    setInterval(fetchSensorData, 2000);
  </script>

</body>
</html>
